 [project]
 name = "moju"
 channels = ["conda-forge"]
 platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

 [dependencies]
 python = ">=3.10,<3.13"
 pip = "*"

 [feature.dev.dependencies]
 pytest = "*"
 ruff = "*"
 black = "*"

 # Core runtime deps (installed via pip editable for local dev)
 [feature.dev.pypi-dependencies]
 moju = { path = ".", editable = true }

 [feature.ref.dependencies]
 xarray = "*"
 pandas = "*"
 pyarrow = "*"
 scipy = "*"

 [feature.report.dependencies]
 reportlab = "*"

 [environments]
 dev = { features = ["dev"] }
 ref = { features = ["dev", "ref"] }
 report = { features = ["dev", "report"] }
 full = { features = ["dev", "ref", "report"] }

